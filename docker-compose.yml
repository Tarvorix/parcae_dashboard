version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - parcae-db:/app
    environment:
      - SEC_IDENTITY=${SEC_IDENTITY:-Parcae Dashboard parcae@example.com}
      - DATABASE_URL=sqlite:////app/data/parcae.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  parcae-db:
